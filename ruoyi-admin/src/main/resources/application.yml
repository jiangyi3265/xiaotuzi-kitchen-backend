# 项目相关配置
ruoyi:
  # 名称
  name: 管理系统
  # 版本
  version: 3.9.1
  # 版权年份
  copyrightYear: 2026
  # 文件路径（可用 RUOYI_PROFILE 覆盖；Windows 默认 D:/ruoyi/uploadPath，Linux 生产用 /home/ruoyi/uploadPath）
  profile: ${RUOYI_PROFILE:D:/ruoyi/uploadPath}
  # 获取ip地址开关
  addressEnabled: false
  # 验证码类型 math 数字计算 char 字符验证
  captchaType: math

# 开发环境配置
server:
  # 服务器的HTTP端口，默认为8080
  port: 8080
  servlet:
    # 应用的访问路径
    context-path: /
  tomcat:
    # tomcat的URI编码
    uri-encoding: UTF-8
    # 连接数满后的排队数，默认为100
    accept-count: 1000
    threads:
      # tomcat最大线程数，默认为200
      max: 800
      # Tomcat启动初始化的线程数，默认值10
      min-spare: 100

# 日志配置（级别可用环境变量覆盖，生产建议 info）
logging:
  level:
    com.ruoyi: ${LOG_LEVEL_RUOYI:debug}
    org.springframework: warn

# 用户配置
user:
  password:
    # 密码最大错误次数
    maxRetryCount: 5
    # 密码锁定时间（默认10分钟）
    lockTime: 10

# Spring配置
spring:
  # 资源信息
  messages:
    # 国际化资源文件路径
    basename: i18n/messages
  profiles:
    active: druid
  # 文件上传
  servlet:
    multipart:
      # 单个文件大小
      max-file-size: 10MB
      # 设置总上传的文件大小
      max-request-size: 20MB
  # 服务模块
  devtools:
    restart:
      # 热部署开关
      enabled: true
  # redis 配置
  redis:
    # 地址
    host: ${REDIS_HOST:localhost}
    # 端口，默认为6379
    port: ${REDIS_PORT:6379}
    # 数据库索引
    database: ${REDIS_DATABASE:0}
    # 密码（生产必须通过 REDIS_PASSWORD 环境变量设置）
    password: ${REDIS_PASSWORD:}
    # 连接超时时间
    timeout: 10s
    lettuce:
      pool:
        # 连接池中的最小空闲连接
        min-idle: 0
        # 连接池中的最大空闲连接
        max-idle: 8
        # 连接池的最大数据库连接数
        max-active: 8
        # #连接池最大阻塞等待时间（使用负值表示没有限制）
        max-wait: -1ms

# token配置
token:
  # 令牌自定义标识
  header: Authorization
  # 令牌密钥（生产必须通过 JWT_SECRET 环境变量注入高强度随机值，切勿使用默认值）
  secret: ${JWT_SECRET:abcdefghijklmnopqrstuvwxyz}
  # 令牌有效期（默认30分钟）
  expireTime: 30

# MyBatis配置
mybatis:
  # 搜索指定包别名
  typeAliasesPackage: com.ruoyi.**.domain
  # 配置mapper的扫描，找到所有的mapper.xml映射文件
  mapperLocations: classpath*:mapper/**/*Mapper.xml
  # 加载全局的配置文件
  configLocation: classpath:mybatis/mybatis-config.xml

# PageHelper分页插件
pagehelper:
  helperDialect: mysql
  supportMethodsArguments: true
  params: count=countSql

# Swagger配置（生产通过 SWAGGER_ENABLED=false 关闭）
swagger:
  # 是否开启swagger
  enabled: ${SWAGGER_ENABLED:true}
  # 请求前缀
  pathMapping: /dev-api

# 防盗链配置
referer:
  # 防盗链开关
  enabled: false
  # 允许的域名列表
  allowed-domains: localhost,127.0.0.1,ruoyi.vip,www.ruoyi.vip

# 防止XSS攻击
xss:
  # 过滤开关
  enabled: true
  # 排除链接（多个用逗号分隔）
  excludes: /system/notice
  # 匹配链接
  urlPatterns: /system/*,/monitor/*,/tool/*

# 微信小程序配置（私房菜厨房）
wx:
  # 小程序 AppID（生产通过 WX_APPID 注入）
  appid: ${WX_APPID:}
  # 小程序 AppSecret（生产通过 WX_SECRET 注入，切勿写入代码库）
  secret: ${WX_SECRET:}
  # 开发模式：true 时若未配置 appid/secret，用 code 直接当 openid 便于本地联调。
  # 生产必须设为 false（WX_DEV_MODE=false），否则存在冒充任意用户的风险。
  devMode: ${WX_DEV_MODE:true}
  # 分享广场发布/评论是否需要审核：1 需要(待审核) 0 直接通过
  shareAudit: ${WX_SHARE_AUDIT:0}
