name: Deploy backend

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-backend
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Verify build
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Maven package
        run: mvn -B package -DskipTests

      - name: Deploy on server
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
          SERVER_DEPLOY_PATH: ${{ secrets.SERVER_DEPLOY_PATH }}
        run: |
          set -euo pipefail
          test -n "$SERVER_HOST"
          test -n "$SERVER_USER"
          test -n "$SERVER_SSH_KEY"

          PORT="${SERVER_PORT:-22}"
          DEPLOY_PATH="${SERVER_DEPLOY_PATH:-/opt/xiaotuzi-kitchen/current}"
          ARCHIVE_NAME="xiaotuzi-backend-${GITHUB_SHA}.tgz"
          OVERLAY_NAME="xiaotuzi-overlay-${GITHUB_SHA}.tgz"

          mkdir -p ~/.ssh
          printf '%s\n' "$SERVER_SSH_KEY" > ~/.ssh/xiaotuzi_deploy_key
          chmod 600 ~/.ssh/xiaotuzi_deploy_key
          ssh-keyscan -p "$PORT" -H "$SERVER_HOST" >> ~/.ssh/known_hosts
          tar \
            --exclude='.git' \
            --exclude='target' \
            --exclude='*/target' \
            -czf "/tmp/$ARCHIVE_NAME" .
          mkdir -p /tmp/backend-overlay/BOOT-INF/classes /tmp/backend-overlay/BOOT-INF/lib
          cp -a ruoyi-admin/target/classes/. /tmp/backend-overlay/BOOT-INF/classes/
          for module in ruoyi-common ruoyi-system ruoyi-framework ruoyi-quartz ruoyi-generator; do
            for jar in "$module"/target/*.jar; do
              if [ -f "$jar" ] && [[ "$jar" != *.original ]]; then cp "$jar" /tmp/backend-overlay/BOOT-INF/lib/; fi
            done
          done
          tar -czf "/tmp/$OVERLAY_NAME" -C /tmp/backend-overlay .
          scp -o BatchMode=yes -o ConnectTimeout=20 -i ~/.ssh/xiaotuzi_deploy_key -P "$PORT" "/tmp/$ARCHIVE_NAME" "$SERVER_USER@$SERVER_HOST:/tmp/$ARCHIVE_NAME"
          scp -o BatchMode=yes -o ConnectTimeout=20 -i ~/.ssh/xiaotuzi_deploy_key -P "$PORT" "/tmp/$OVERLAY_NAME" "$SERVER_USER@$SERVER_HOST:/tmp/$OVERLAY_NAME"

          ssh -i ~/.ssh/xiaotuzi_deploy_key -p "$PORT" "$SERVER_USER@$SERVER_HOST" \
            "DEPLOY_PATH='$DEPLOY_PATH' ARCHIVE_NAME='$ARCHIVE_NAME' OVERLAY_NAME='$OVERLAY_NAME' bash -s" <<'EOF'
          set -euo pipefail

          TARGET_DIR="$DEPLOY_PATH/RuoYi-Vue"
          rm -rf "$TARGET_DIR"
          mkdir -p "$TARGET_DIR"
          tar -xzf "/tmp/$ARCHIVE_NAME" -C "$TARGET_DIR"
          rm -f "/tmp/$ARCHIVE_NAME"
          mkdir -p "$TARGET_DIR/deploy-artifact"
          OVERLAY_DIR="$(mktemp -d)"
          tar -xzf "/tmp/$OVERLAY_NAME" -C "$OVERLAY_DIR"
          rm -f "/tmp/$OVERLAY_NAME"
          BASE_CONTAINER="$(docker compose -f "$DEPLOY_PATH/docker-compose.deploy.yml" ps -q backend)"
          test -n "$BASE_CONTAINER"
          docker cp "$BASE_CONTAINER:/app/app.jar" "$TARGET_DIR/deploy-artifact/app.jar"
          python3 - "$TARGET_DIR/deploy-artifact/app.jar" "$OVERLAY_DIR" <<'PY'
          import os, sys, zipfile
          jar, overlay = sys.argv[1:]
          replacement = {}
          for root, _, files in os.walk(overlay):
              for name in files:
                  path = os.path.join(root, name)
                  replacement[os.path.relpath(path, overlay).replace(os.sep, '/')] = path
          rebuilt = jar + '.new'
          with zipfile.ZipFile(jar, 'r') as src, zipfile.ZipFile(rebuilt, 'w') as dst:
              for info in src.infolist():
                  stale_shadow = info.filename.startswith('BOOT-INF/classes/com/ruoyi/') or info.filename.startswith('BOOT-INF/classes/mapper/')
                  if info.filename not in replacement and not stale_shadow:
                      dst.writestr(info, src.read(info.filename))
              for name, path in replacement.items():
                  compression = zipfile.ZIP_STORED if name.startswith('BOOT-INF/lib/') else zipfile.ZIP_DEFLATED
                  dst.write(path, name, compress_type=compression)
          with zipfile.ZipFile(rebuilt, 'r') as check:
              for name, path in replacement.items():
                  with open(path, 'rb') as source:
                      assert check.read(name) == source.read(), name
          os.replace(rebuilt, jar)
          PY
          rm -rf "$OVERLAY_DIR"

          cd "$DEPLOY_PATH"

          for sql in \
            RuoYi-Vue/sql/kitchen_patch_20260708_ingredients.sql \
            RuoYi-Vue/sql/kitchen_patch_20260708_demo_ingredients.sql \
            RuoYi-Vue/sql/kitchen_patch_20260711_region_agent.sql \
            RuoYi-Vue/sql/kitchen_patch_20260711_social_spaces.sql
          do
            if [ -f "$sql" ]; then
              docker exec -i xiaotuzi-mysql sh -c 'mysql --default-character-set=utf8mb4 -uroot -p"$MYSQL_ROOT_PASSWORD" ha' < "$sql"
            fi
          done

          docker compose -f docker-compose.deploy.yml up -d --build backend
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:18081/api/wx/shop/info >/dev/null; then
              break
            fi
            sleep 3
          done
          curl -fsS http://127.0.0.1:18081/api/wx/shop/info >/dev/null

          TABLE_COUNT="$(docker exec xiaotuzi-mysql sh -c 'mysql -Nse "select count(*) from information_schema.tables where table_schema=database() and table_name in (\"kitchen_region_application\",\"kitchen_group_room\",\"kitchen_group_member\",\"kitchen_group_item\",\"kitchen_couple_space\",\"kitchen_couple_anniversary\",\"kitchen_user_notification\")" -uroot -p"$MYSQL_ROOT_PASSWORD" ha')"
          test "$TABLE_COUNT" = "7"
          COLUMN_COUNT="$(docker exec xiaotuzi-mysql sh -c 'mysql -Nse "select count(*) from information_schema.columns where table_schema=database() and table_name=\"kitchen_order\" and column_name in (\"group_room_id\",\"couple_space_id\",\"recipient_wx_user_id\")" -uroot -p"$MYSQL_ROOT_PASSWORD" ha')"
          test "$COLUMN_COUNT" = "3"
          curl -fsS 'http://127.0.0.1:18081/api/wx/region/status?province=test&city=test&district=test' | grep -q '"code":200'
          curl -fsS 'http://127.0.0.1:18081/api/wx/region/opened' | grep -q '"code":200'
          curl -fsS http://127.0.0.1:18081/api/wx/social/couple/leaderboard | grep -q '"code":200'
          curl -fsS http://127.0.0.1:18081/api/wx/social/notifications | grep -q '"code":401'
          curl -fsS -H 'Content-Type: application/json' -d '{"title":"smoke"}' http://127.0.0.1:18081/api/wx/social/group/create | grep -q '"code":401'
          docker compose -f docker-compose.deploy.yml ps
          EOF
