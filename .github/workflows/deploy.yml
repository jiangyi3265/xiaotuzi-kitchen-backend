name: Deploy backend

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-backend
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Verify build
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Maven test and package
        run: mvn -B package

      - name: Deploy on server
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
          SERVER_DEPLOY_PATH: ${{ secrets.SERVER_DEPLOY_PATH }}
        run: |
          set -euo pipefail
          test -n "$SERVER_HOST"
          test -n "$SERVER_USER"
          test -n "$SERVER_SSH_KEY"

          PORT="${SERVER_PORT:-22}"
          DEPLOY_PATH="${SERVER_DEPLOY_PATH:-/opt/xiaotuzi-kitchen/current}"
          ARCHIVE_NAME="xiaotuzi-backend-${GITHUB_SHA}.tgz"
          JAR_NAME="xiaotuzi-backend-${GITHUB_SHA}.jar"
          JAR_PART_PREFIX="${JAR_NAME}.part."
          APP_LAYER_NAME="xiaotuzi-backend-app-${GITHUB_SHA}.tgz"
          APP_LAYER_DIR="/tmp/xiaotuzi-backend-layers-${GITHUB_SHA}"
          JAR_PATH="$GITHUB_WORKSPACE/ruoyi-admin/target/ruoyi-admin.jar"
          JAR_SIZE="$(stat -c%s ruoyi-admin/target/ruoyi-admin.jar)"
          JAR_SHA256="$(sha256sum ruoyi-admin/target/ruoyi-admin.jar | cut -d' ' -f1)"

          mkdir -p "$APP_LAYER_DIR"
          (cd "$APP_LAYER_DIR" && java -Djarmode=layertools -jar "$JAR_PATH" extract)
          tar -C "$APP_LAYER_DIR/application" -czf "/tmp/$APP_LAYER_NAME" .
          mapfile -t JAR_FINGERPRINTS < <(python3 - "$JAR_PATH" <<'PY'
          import hashlib, sys, zipfile
          def is_app(name):
              return (name.startswith("BOOT-INF/classes/") or
                      name in ("BOOT-INF/classpath.idx", "BOOT-INF/layers.idx") or
                      name.startswith("BOOT-INF/lib/ruoyi-") or
                      name.startswith("META-INF/"))
          with zipfile.ZipFile(sys.argv[1]) as jar:
              entries = jar.infolist()
          def digest(rows):
              value = hashlib.sha256()
              for name, crc, size, compression in sorted(rows):
                  value.update(f"{name}:{crc}:{size}:{compression}\n".encode())
              return value.hexdigest()
          print(digest((item.filename, item.CRC, item.file_size, item.compress_type) for item in entries if not is_app(item.filename)))
          print(digest((item.filename, item.CRC, item.file_size, item.compress_type) for item in entries))
          PY
          )
          JAR_BASE_FINGERPRINT="${JAR_FINGERPRINTS[0]}"
          JAR_CONTENT_FINGERPRINT="${JAR_FINGERPRINTS[1]}"

          mkdir -p ~/.ssh
          printf '%s\n' "$SERVER_SSH_KEY" > ~/.ssh/xiaotuzi_deploy_key
          chmod 600 ~/.ssh/xiaotuzi_deploy_key
          : > ~/.ssh/known_hosts
          for attempt in $(seq 1 30); do
            if ssh-keyscan -T 10 -p "$PORT" -H "$SERVER_HOST" > ~/.ssh/known_hosts 2>/dev/null; then
              break
            fi
            echo "Waiting for SSH to recover (attempt $attempt/30)"
            sleep 20
          done
          test -s ~/.ssh/known_hosts
          tar \
            --exclude='.git' \
            --exclude='target' \
            --exclude='*/target' \
            -czf "/tmp/$ARCHIVE_NAME" .

          transfer_file() {
            local source="$1"
            local destination="$2"
            for attempt in $(seq 1 10); do
              if scp \
                -o BatchMode=yes \
                -o ConnectTimeout=30 \
                -o ServerAliveInterval=20 \
                -o ServerAliveCountMax=15 \
                -i ~/.ssh/xiaotuzi_deploy_key \
                -P "$PORT" \
                "$source" \
                "$SERVER_USER@$SERVER_HOST:$destination"
              then
                return 0
              fi
              echo "Retrying artifact transfer (attempt $attempt/10)"
              sleep 20
            done
            return 1
          }

          transfer_file "/tmp/$ARCHIVE_NAME" "/tmp/$ARCHIVE_NAME"
          transfer_file "/tmp/$APP_LAYER_NAME" "/tmp/$APP_LAYER_NAME"

          CURRENT_JAR="$DEPLOY_PATH/RuoYi-Vue/deploy-artifact/app.jar"
          BASE_JAR="/tmp/xiaotuzi-current-backend.jar"
          PATCH_MODE=0
          if ssh \
            -o BatchMode=yes \
            -o ConnectTimeout=30 \
            -o ServerAliveInterval=20 \
            -o ServerAliveCountMax=15 \
            -i ~/.ssh/xiaotuzi_deploy_key \
            -p "$PORT" \
            "$SERVER_USER@$SERVER_HOST" \
            "rm -f '$BASE_JAR'; if test -f '$CURRENT_JAR'; then cp '$CURRENT_JAR' '$BASE_JAR'; else docker cp xiaotuzi-backend:/app/app.jar '$BASE_JAR'; fi; python3 -c 'import hashlib,sys,zipfile; a=lambda n: n.startswith(\"BOOT-INF/classes/\") or n in (\"BOOT-INF/classpath.idx\",\"BOOT-INF/layers.idx\") or n.startswith(\"BOOT-INF/lib/ruoyi-\") or n.startswith(\"META-INF/\"); z=zipfile.ZipFile(sys.argv[1]); rows=sorted((i.filename,i.CRC,i.file_size,i.compress_type) for i in z.infolist() if not a(i.filename)); h=hashlib.sha256(); [h.update((\"%s:%s:%s:%s\\n\"%r).encode()) for r in rows]; assert h.hexdigest()==sys.argv[2]' '$BASE_JAR' '$JAR_BASE_FINGERPRINT'"
          then
            PATCH_MODE=1
            echo "Reusing unchanged backend dependency layer from the server"
          else
            echo "Dependency layer changed or unavailable; transferring the full backend in chunks"
            split -b 5m -d -a 3 "$JAR_PATH" "/tmp/$JAR_PART_PREFIX"
            ssh \
              -o BatchMode=yes \
              -o ConnectTimeout=30 \
              -o ServerAliveInterval=20 \
              -o ServerAliveCountMax=15 \
              -i ~/.ssh/xiaotuzi_deploy_key \
              -p "$PORT" \
              "$SERVER_USER@$SERVER_HOST" \
              "rm -f /tmp/${JAR_PART_PREFIX}* /tmp/$JAR_NAME"
            PART_COUNT="$(find /tmp -maxdepth 1 -type f -name "${JAR_PART_PREFIX}*" | wc -l)"
            PART_INDEX=0
            for part in /tmp/${JAR_PART_PREFIX}*; do
              PART_INDEX=$((PART_INDEX + 1))
              echo "Transferring backend chunk $PART_INDEX/$PART_COUNT"
              transfer_file "$part" "/tmp/$(basename "$part")"
            done
          fi

          ssh \
            -o ServerAliveInterval=20 \
            -o ServerAliveCountMax=120 \
            -i ~/.ssh/xiaotuzi_deploy_key \
            -p "$PORT" \
            "$SERVER_USER@$SERVER_HOST" \
            "DEPLOY_PATH='$DEPLOY_PATH' ARCHIVE_NAME='$ARCHIVE_NAME' JAR_NAME='$JAR_NAME' JAR_PART_PREFIX='$JAR_PART_PREFIX' APP_LAYER_NAME='$APP_LAYER_NAME' BASE_JAR='$BASE_JAR' PATCH_MODE='$PATCH_MODE' JAR_SIZE='$JAR_SIZE' JAR_SHA256='$JAR_SHA256' JAR_CONTENT_FINGERPRINT='$JAR_CONTENT_FINGERPRINT' bash -s" <<'EOF'
          set -euo pipefail

          TARGET_DIR="$DEPLOY_PATH/RuoYi-Vue"
          if [ "$PATCH_MODE" = "1" ]; then
            REPLACEMENT_DIR="/tmp/xiaotuzi-backend-application"
            rm -rf "$REPLACEMENT_DIR"
            mkdir -p "$REPLACEMENT_DIR"
            tar -xzf "/tmp/$APP_LAYER_NAME" -C "$REPLACEMENT_DIR"
            python3 - "$BASE_JAR" "/tmp/$JAR_NAME" "$REPLACEMENT_DIR" "$JAR_CONTENT_FINGERPRINT" <<'PY'
          import hashlib, pathlib, sys, zipfile
          source, destination, replacement_root, expected = sys.argv[1:]
          replacement_root = pathlib.Path(replacement_root)
          def is_app(name):
              return (name.startswith("BOOT-INF/classes/") or
                      name in ("BOOT-INF/classpath.idx", "BOOT-INF/layers.idx") or
                      name.startswith("BOOT-INF/lib/ruoyi-") or
                      name.startswith("META-INF/"))
          with zipfile.ZipFile(source) as old, zipfile.ZipFile(destination, "w") as new:
              written = set()
              for item in old.infolist():
                  if is_app(item.filename):
                      continue
                  new.writestr(item, old.read(item.filename))
                  written.add(item.filename)
              replacement_files = [path for path in sorted(replacement_root.rglob("*")) if path.is_file()]
              replacement_dirs = set()
              for path in replacement_files:
                  relative = path.relative_to(replacement_root)
                  replacement_dirs.update(parent for parent in relative.parents if parent != pathlib.Path("."))
              for directory in sorted(replacement_dirs, key=lambda value: value.as_posix()):
                  name = directory.as_posix().rstrip("/") + "/"
                  if name not in written:
                      info = zipfile.ZipInfo(name)
                      info.compress_type = zipfile.ZIP_DEFLATED if name in ("BOOT-INF/classes/", "META-INF/") else zipfile.ZIP_STORED
                      info.external_attr = 0o40775 << 16
                      new.writestr(info, b"")
                      written.add(name)
              for path in replacement_files:
                  name = path.relative_to(replacement_root).as_posix()
                  compression = zipfile.ZIP_STORED if name.startswith("BOOT-INF/lib/") and name.endswith(".jar") else zipfile.ZIP_DEFLATED
                  new.write(path, name, compress_type=compression)
          with zipfile.ZipFile(destination) as jar:
              rows = sorted((item.filename, item.CRC, item.file_size, item.compress_type) for item in jar.infolist())
          value = hashlib.sha256()
          for name, crc, size, compression in rows:
              value.update(f"{name}:{crc}:{size}:{compression}\n".encode())
          if value.hexdigest() != expected:
              raise SystemExit("patched backend content fingerprint mismatch")
          PY
            rm -rf "$REPLACEMENT_DIR"
          else
            cat /tmp/${JAR_PART_PREFIX}* > "/tmp/$JAR_NAME"
            rm -f /tmp/${JAR_PART_PREFIX}*
            test "$(stat -c%s "/tmp/$JAR_NAME")" = "$JAR_SIZE"
            test "$(sha256sum "/tmp/$JAR_NAME" | cut -d' ' -f1)" = "$JAR_SHA256"
          fi
          rm -f "$BASE_JAR"
          rm -f "/tmp/$APP_LAYER_NAME"
          rm -rf "$TARGET_DIR"
          mkdir -p "$TARGET_DIR"
          tar -xzf "/tmp/$ARCHIVE_NAME" -C "$TARGET_DIR"
          rm -f "/tmp/$ARCHIVE_NAME"
          mkdir -p "$TARGET_DIR/deploy-artifact"
          mv "/tmp/$JAR_NAME" "$TARGET_DIR/deploy-artifact/app.jar"

          cd "$DEPLOY_PATH"

          for sql in \
            RuoYi-Vue/sql/kitchen_patch_20260708_ingredients.sql \
            RuoYi-Vue/sql/kitchen_patch_20260708_demo_ingredients.sql \
            RuoYi-Vue/sql/kitchen_patch_20260711_region_agent.sql \
            RuoYi-Vue/sql/kitchen_patch_20260711_social_spaces.sql \
            RuoYi-Vue/sql/kitchen_patch_20260712_service_application.sql \
            RuoYi-Vue/sql/kitchen_patch_20260713_feedback_market.sql \
            RuoYi-Vue/sql/kitchen_patch_20260713_today_schedule.sql \
            RuoYi-Vue/sql/kitchen_patch_20260713_couple_cart.sql \
            RuoYi-Vue/sql/kitchen_patch_20260715_grocery_specs.sql \
            RuoYi-Vue/sql/kitchen_patch_20260715_feature_switch.sql \
            RuoYi-Vue/sql/kitchen_patch_20260717_profile_qr.sql \
            RuoYi-Vue/sql/kitchen_patch_20260718_business_integrity.sql
          do
            if [ -f "$sql" ]; then
              docker exec -i xiaotuzi-mysql sh -c 'mysql --default-character-set=utf8mb4 -uroot -p"$MYSQL_ROOT_PASSWORD" ha' < "$sql"
            fi
          done

          docker compose -f docker-compose.deploy.yml up -d --build backend
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:18081/api/wx/shop/info >/dev/null; then
              break
            fi
            sleep 3
          done
          if ! curl -fsS http://127.0.0.1:18081/api/wx/shop/info >/dev/null; then
            docker compose -f docker-compose.deploy.yml ps || true
            docker logs --tail 300 xiaotuzi-backend || true
            exit 1
          fi

          CAPTCHA_RESPONSE="$(curl -fsS http://127.0.0.1:18081/captchaImage)"
          printf '%s' "$CAPTCHA_RESPONSE" | python3 -c "import json,sys; d=json.load(sys.stdin); assert d['code']==200 and d.get('captchaEnabled') in (True,False); assert not d.get('captchaEnabled') or (d.get('uuid') and len(d.get('img',''))>100)"
          LOGIN_RESPONSE="$(curl -fsS -H 'Content-Type: application/json' -d '{"username":"deployment_route_probe","password":"invalid","code":"","uuid":""}' http://127.0.0.1:18081/login)"
          printf '%s' "$LOGIN_RESPONSE" | python3 -c "import json,sys; d=json.load(sys.stdin); assert 'code' in d and 'timestamp' not in d"
          curl -fsS http://127.0.0.1:18081/getInfo | grep -q '"code":401'

          TABLE_COUNT="$(docker exec xiaotuzi-mysql sh -c 'mysql -Nse "select count(*) from information_schema.tables where table_schema=database() and table_name in (\"kitchen_region_application\",\"kitchen_service_application\",\"kitchen_feedback\",\"kitchen_group_room\",\"kitchen_group_member\",\"kitchen_group_item\",\"kitchen_couple_space\",\"kitchen_couple_anniversary\",\"kitchen_couple_item\",\"kitchen_user_notification\")" -uroot -p"$MYSQL_ROOT_PASSWORD" ha')"
          test "$TABLE_COUNT" = "10"
          COLUMN_COUNT="$(docker exec xiaotuzi-mysql sh -c 'mysql -Nse "select count(*) from information_schema.columns where table_schema=database() and table_name=\"kitchen_order\" and column_name in (\"group_room_id\",\"couple_space_id\",\"recipient_wx_user_id\",\"grocery_json\")" -uroot -p"$MYSQL_ROOT_PASSWORD" ha')"
          test "$COLUMN_COUNT" = "4"
          SHOP_COLUMN_COUNT="$(docker exec xiaotuzi-mysql sh -c 'mysql -Nse "select count(*) from information_schema.columns where table_schema=database() and table_name=\"kitchen_shop\" and column_name in (\"stock_group_qr\",\"stock_group_name\",\"stock_group_notice\",\"official_account_qr\")" -uroot -p"$MYSQL_ROOT_PASSWORD" ha')"
          test "$SHOP_COLUMN_COUNT" = "4"
          TODAY_COLUMN_COUNT="$(docker exec xiaotuzi-mysql sh -c 'mysql -Nse "select count(*) from information_schema.columns where table_schema=database() and table_name=\"kitchen_dish\" and column_name=\"today_type\"" -uroot -p"$MYSQL_ROOT_PASSWORD" ha')"
          test "$TODAY_COLUMN_COUNT" = "1"
          FEATURE_CONFIG_COUNT="$(docker exec xiaotuzi-mysql sh -c 'mysql -Nse "select count(*) from sys_config where config_key=\"wx.feature.enabled\"" -uroot -p"$MYSQL_ROOT_PASSWORD" ha')"
          test "$FEATURE_CONFIG_COUNT" = "1"
          FEATURE_MENU_COUNT="$(docker exec xiaotuzi-mysql sh -c 'mysql -Nse "select count(*) from sys_menu where component=\"applet/switch/index\"" -uroot -p"$MYSQL_ROOT_PASSWORD" ha')"
          test "$FEATURE_MENU_COUNT" = "1"
          FEATURE_EDIT_PERMISSION_COUNT="$(docker exec xiaotuzi-mysql sh -c 'mysql -Nse "select count(*) from sys_menu where perms=\"applet:switch:edit\"" -uroot -p"$MYSQL_ROOT_PASSWORD" ha')"
          test "$FEATURE_EDIT_PERMISSION_COUNT" = "1"
          FEATURE_MENU_PARENT_COUNT="$(docker exec xiaotuzi-mysql sh -c 'mysql -Nse "select count(*) from sys_menu child where child.component=\"applet/switch/index\" and child.parent_id=(select sibling.parent_id from sys_menu sibling where sibling.component=\"kitchen/shop/index\" order by sibling.menu_id limit 1)" -uroot -p"$MYSQL_ROOT_PASSWORD" ha')"
          test "$FEATURE_MENU_PARENT_COUNT" = "1"
          DISH_CATEGORY_ANOMALY_COUNT="$(docker exec xiaotuzi-mysql sh -c 'mysql -Nse "select count(*) from kitchen_dish d left join kitchen_category c on c.id=d.category_id left join kitchen_category p on p.id=c.parent_id left join kitchen_category gp on gp.id=p.parent_id where d.del_flag=\"0\" and d.status=\"1\" and (c.id is null or c.del_flag<>\"0\" or c.status<>\"0\" or (coalesce(c.parent_id,0)<>0 and (p.id is null or p.del_flag<>\"0\" or p.status<>\"0\")) or (coalesce(p.parent_id,0)<>0 and (gp.id is null or gp.del_flag<>\"0\" or gp.status<>\"0\")) or coalesce(gp.parent_id,0)<>0 or c.cat_level<>case when coalesce(c.parent_id,0)=0 then 1 when coalesce(p.parent_id,0)=0 then 2 when coalesce(gp.parent_id,0)=0 then 3 else 0 end or not (c.ancestors <=> case when coalesce(c.parent_id,0)=0 then \"0\" when coalesce(p.parent_id,0)=0 then concat(\"0,\",p.id) when coalesce(gp.parent_id,0)=0 then concat(\"0,\",gp.id,\",\",p.id) else null end))" -uroot -p"$MYSQL_ROOT_PASSWORD" ha')"
          test "$DISH_CATEGORY_ANOMALY_COUNT" = "0"
          SHARE_COUNT_DRIFT="$(docker exec xiaotuzi-mysql sh -c 'mysql -Nse "select count(*) from kitchen_share_post p where coalesce(p.like_count,0)<>(select count(*) from kitchen_post_like l where l.post_id=p.id) or coalesce(p.comment_count,0)<>(select count(*) from kitchen_comment c where c.post_id=p.id and c.audit_status=\"1\" and c.del_flag=\"0\")" -uroot -p"$MYSQL_ROOT_PASSWORD" ha')"
          test "$SHARE_COUNT_DRIFT" = "0"
          curl -fsS http://127.0.0.1:18081/api/wx/common/features | python3 -c "import json,sys; d=json.load(sys.stdin); assert d['code']==200 and isinstance(d.get('enabled'), bool)"
          curl -fsS 'http://127.0.0.1:18081/api/wx/region/status?province=test&city=test&district=test' | grep -q '"code":200'
          curl -fsS 'http://127.0.0.1:18081/api/wx/region/opened' | grep -q '"code":200'
          curl -fsS 'http://127.0.0.1:18081/api/wx/service-application/my?applicationType=0' | grep -q '"code":401'
          curl -fsS 'http://127.0.0.1:18081/api/wx/feedback/my' | grep -q '"code":401'
          curl -fsS http://127.0.0.1:18081/api/wx/social/couple/leaderboard | grep -q '"code":401'
          curl -fsS http://127.0.0.1:18081/api/wx/social/notifications | grep -q '"code":401'
          curl -sS -H 'Content-Type: application/json' -d '{"title":"smoke"}' http://127.0.0.1:18081/api/wx/social/group/create | python3 -c "import json,sys; d=json.load(sys.stdin); assert d.get('code') in (401,403)"
          docker compose -f docker-compose.deploy.yml ps
          EOF
